<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribd Fast Downloader</title>
    <style>
        :root {
            --primary: #1a73e8;
            --success: #1e8e3e;
            --bg: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 450px;
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-scribd { background: #000; color: white; }
        .btn-paste { background: #e8f0fe; color: var(--primary); border: 1px solid #d2e3fc; }
        .btn-go { background: var(--success); color: white; margin-top: 10px; }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            margin-top: 5px;
        }

        .footer-info {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="header">Assistente de Extração</div>

<div class="card">
    <button class="btn btn-scribd" onclick="window.open('https://www.scribd.com', '_blank')">
        1. Abrir Scribd
    </button>

    <label style="font-size: 12px; font-weight: bold; color: #475569;">LINK COPIADO:</label>
    <input type="text" id="urlInput" placeholder="https://www.scribd.com/doc/...">

    <button class="btn btn-paste" onclick="handlePaste()" style="margin-top: 10px;">
        2. Colar Link
    </button>

    <button class="btn btn-go" onclick="runDownloaders()">
        3. Gerar Links Diretos
    </button>
</div>

<div class="footer-info">
    O link será injetado automaticamente nos sistemas de extração.
</div>

<script>
    async function handlePaste() {
        try {
            const text = await navigator.clipboard.readText();
            if (text.includes("scribd.com")) {
                document.getElementById('urlInput').value = text;
            } else {
                alert("O link na área de transferência não é do Scribd.");
            }
        } catch (e) {
            alert("Clique no campo e cole manualmente.");
        }
    }

    function runDownloaders() {
        const rawUrl = document.getElementById('urlInput').value.trim();
        if (!rawUrl) return alert("Cole um link primeiro!");

        const encodedUrl = encodeURIComponent(rawUrl);

        // Formatação de URLs para abrir já com o link "injetado"
        const targets = [
            `https://docdownloader.com/?s=${encodedUrl}`,
            `https://dlscrib.com/?url=${encodedUrl}`,
            `https://scribd.vdownloaders.com/?url=${encodedUrl}`,
            `https://scrdownloader.com/` // Este exige colagem manual por segurança do site
        ];

        targets.forEach((link, i) => {
            setTimeout(() => {
                window.open(link, '_blank');
            }, i * 600);
        });
    }
</script>

</body>
</html>
